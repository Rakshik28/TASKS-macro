<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Multimedia Form Page</title>

<style>
/* Element Selector */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* ID Selector */
#pageTitle{
    color:white;
}

/* Class Selector */
.hero{
    position:relative;
    height:300px;
    background:url('https://picsum.photos/1200/500') center/cover;
}

/* z-index */
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:1;
}

.hero-content{
    position:relative;
    z-index:2;
    text-align:center;
    color:white;
    padding-top:100px;
}

/* Grid Layout */
.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    position:relative;
}

/* Absolute Position */
.card::after{
    content:"NEW";
    position:absolute;
    top:10px;
    right:10px;
    background:orange;
    color:white;
    padding:4px 8px;
    border-radius:5px;
}

/* Sticky Position */
.sticky-title{
    position:sticky;
    top:0;
    background:white;
    padding:10px;
}

/* Fixed Position */
.fixed-help{
    position:fixed;
    bottom:20px;
    right:20px;
    background:red;
    color:white;
    padding:12px;
    border-radius:50%;
    z-index:999;
}

/* Relative Position */
.grid-form{
    position:relative;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

/* Attribute Selector */
input[type="email"]{
    border:2px solid royalblue;
}

input,
textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

/* Flexbox */
fieldset{
    display:flex;
    gap:20px;
    margin:15px 0;
}

iframe{
    width:100%;
    height:250px;
    border:none;
}

audio,
video{
    width:100%;
    margin-top:10px;
}

/* Responsive */
@media(max-width:768px){

    .layout{
        grid-template-columns:1fr;
    }

    .grid-form{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="fixed-help">?</div>

<header class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1 id="pageTitle">Responsive Multimedia Form Page</h1>
        <p>HTML • CSS • JavaScript Demo</p>
    </div>
</header>

<div class="layout">

    <!-- FORM SECTION -->
    <section class="card">

        <h2 class="sticky-title">Registration Form</h2>

        <form id="userForm">

            <div class="grid-form">

                <div>
                    <label>Name</label>
                    <input type="text"
                           id="name"
                           placeholder="Enter Name"
                           required>
                </div>

                <div>
                    <label>Email</label>
                    <input type="email"
                           id="email"
                           placeholder="Enter Email"
                           required>
                </div>

            </div>

            <fieldset>
                <legend>Gender</legend>

                <label>
                    <input type="radio"
                           name="gender"
                           value="Male"
                           required> Male
                </label>

                <label>
                    <input type="radio"
                           name="gender"
                           value="Female"> Female
                </label>
            </fieldset>

            <fieldset>
                <legend>Skills</legend>

                <label>
                    <input type="checkbox"> HTML
                </label>

                <label>
                    <input type="checkbox"> CSS
                </label>

                <label>
                    <input type="checkbox"> JavaScript
                </label>
            </fieldset>

            <label>Message</label>

            <textarea id="message"
                      rows="5"
                      placeholder="Enter your message"
                      required></textarea>

            <button type="submit">Submit</button>

        </form>

    </section>

    <!-- MULTIMEDIA SECTION -->
    <section class="card">

        <h2>Embedded Web Page (iFrame)</h2>

        <iframe width="560" height="315" src="https://www.youtube.com/embed/GXao7KtgGqw?si=juvcMxJkvcBNuvmE" title="YouTube video player" frameborder="5" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h1>Audio...</h1>
        <h2>Audio Player</h2>

        <audio id="audioPlayer" controls>
            <source src="/Prema_Velluva.mp3" type="audio/mpeg">
            Your browser does not support audio.
        </audio>

        <h2>Video Player</h2>

        <video id="videoPlayer" controls>
            <source src="/self intro.mp4" type="video/mp4">
            Your browser does not support video.
        </video>

    </section>

</div>

<script>

/* Form Submission */
document.getElementById("userForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let name =
        document.getElementById("name").value;

    let email =
        document.getElementById("email").value;

    console.log(
        "[Form Submission] Name: " +
        name +
        ", Email: " +
        email
    );

    alert("Form Submitted Successfully!");
});

/* iFrame Loaded */
document.getElementById("myFrame")
.addEventListener("load", function(){

    console.log(
        "[i-frame Loaded] " +
        this.src
    );

});

/* Audio Event */
document.getElementById("audioPlayer")
.addEventListener("play", function(){

    console.log(
        "[Audio] Played: song.mp3"
    );

});

/* Video Event */
document.getElementById("videoPlayer")
.addEventListener("play", function(){

    console.log(
        "[Video] Played: video.mp4"
    );

});

/* Mobile Layout Detection */
function checkLayout(){

    if(window.innerWidth <= 768){

        console.log(
            "[Layout] Columns collapsed on mobile breakpoint"
        );
    }
}

window.addEventListener("resize", checkLayout);
checkLayout();

</script>

</body>
</html>
