<!DOCTYPE html>
<html>
<head>
    <title>Interactive Animated Calculator</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f4f4;
            text-align:center;
            padding:30px;
        }

        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        /* Display Properties */

        .block{
            display:block;
            margin:10px 0;
        }

        .inline{
            display:inline;
            color:blue;
        }

        .inline-block{
            display:inline-block;
            width:120px;
        }

        .hidden{
            display:none;
        }

        input,select{
            padding:10px;
            width:90%;
            margin:10px;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
            border:none;
            background:green;
            color:white;
            border-radius:5px;
        }

        /* Keyframe Animation */

        @keyframes glow{

            0%{
                background:#fff;
            }

            50%{
                background:yellow;
                transform:scale(1.05);
            }

            100%{
                background:#fff;
            }
        }

        .animate{
            animation:glow 1s ease;
        }

        #result{
            margin-top:20px;
            padding:15px;
            border:2px solid green;
            font-size:22px;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Interactive Animated Calculator</h2>

    <span class="inline">DOM + BOM + Functions Demo</span>

    <input type="number"
           id="num1"
           placeholder="Enter Number 1"
           class="block">

    <input type="number"
           id="num2"
           placeholder="Enter Number 2"
           class="block">

    <select id="operation" class="block">

        <option value="+">Addition</option>
        <option value="-">Subtraction</option>
        <option value="*">Multiplication</option>
        <option value="/">Division</option>

    </select>

    <button onclick="calculate()">
        Calculate
    </button>

    <button onclick="clearResult()">
        Clear
    </button>

    <div id="result">
        Result Appears Here
    </div>

</div>

<script>

    console.log("===== JavaScript Runtime Environment =====");

    console.log("Call Stack Started");

    function first(){
        second();
    }

    function second(){
        console.log("Inside Second Function");
    }

    first();

    console.log("Call Stack Ended");



    console.log("===== Hoisting Demo =====");

    hoistedFunction();

    function hoistedFunction(){
        console.log(
        "[Hoisting Demo] Function executed before declaration"
        );
    }



    console.log("===== TDZ Demo =====");

    try{

        console.log(myVar);

        let myVar = 100;

    }

    catch(error){

        console.log(
        "TDZ Error: Cannot access variable before initialization"
        );

    }



    /* Normal Function */

    function calculate(){

        let n1 =
        Number(document.getElementById("num1").value);

        let n2 =
        Number(document.getElementById("num2").value);

        let op =
        document.getElementById("operation").value;

        let result;

        console.log(
        `[User Input] Number 1: ${n1}, Number 2: ${n2}`
        );



        switch(op){

            case "+":
                result = n1 + n2;
                break;

            case "-":
                result = n1 - n2;
                break;

            case "*":
                result = n1 * n2;
                break;

            case "/":

                if(n2 === 0){

                    alert("Division by Zero Not Allowed");
                    return;

                }

                result = n1 / n2;
                break;

            default:
                result = 0;

        }



        console.log(
        `[Operation] ${n1} ${op} ${n2} = ${result}`
        );



        document.getElementById("result")
        .innerHTML = result;

        console.log(
        `[DOM Updated] Display: ${result}`
        );



        let box =
        document.getElementById("result");

        box.classList.add("animate");

        console.log(
        "[Animation Triggered] Keyframe effect on result box"
        );

        setTimeout(function(){

            box.classList.remove("animate");

        },1000);

    }



    /* Anonymous Function */

    let greet = function(){

        console.log(
        "Anonymous Function Executed"
        );

    };

    greet();



    /* Arrow Function */

    const square = (x) => x*x;

    console.log(
    "Arrow Function Square(5) = " + square(5)
    );



    /* IIFE */

    (function(){

        console.log(
        "IIFE Executed Automatically"
        );

    })();



    /* BOM Methods */

    function clearResult(){

        let answer =
        confirm(
        "[BOM Alert] Confirm to clear result?"
        );

        if(answer){

            document.getElementById("result")
            .innerHTML = "Result Cleared";

        }

    }



    console.log("Navigator Information");

    console.log(navigator.userAgent);



    console.log("Current URL");

    console.log(location.href);



    /* Function Currying */

    function greeting(name){

        return function(message){

            return `${message} ${name}! Welcome Back!`;

        };

    }

    let userGreeting =
    greeting("John");

    console.log(
    "[Currying Demo] " +
    userGreeting("Hello")
    );



    /* DOM Methods */

    console.log(
    document.getElementById("result")
    );

    console.log(
    document.querySelector("#result")
    );

</script>

</body>
</html>
